# ─────────────────────────────────────────────────────────────
#  Minimal HTTP config for Certbot --nginx certificate generation
#  Replace with nginx.conf after certificates are obtained
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name meetin.space api.meetin.space livekit.meetin.space auth.meetin.space;

    location / {
        return 200 "MeetingHub — waiting for SSL setup\n";
        add_header Content-Type text/plain;
    }
}
