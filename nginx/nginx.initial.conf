# ─────────────────────────────────────────────────────────────
#  STEP 1 — Minimal HTTP-only config for Certbot certificate generation
#  Replace with nginx.conf after certificates are obtained
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name meetin.space api.meetin.space livekit.meetin.space auth.meetin.space;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Temporary — return something so we know nginx is alive
    location / {
        return 200 "MeetingHub — waiting for SSL setup\n";
        add_header Content-Type text/plain;
    }
}
