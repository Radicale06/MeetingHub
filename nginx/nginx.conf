# ─────────────────────────────────────────────────────────────
#  MeetingHub — Nginx Reverse Proxy
#  Domain: meetin.space
# ─────────────────────────────────────────────────────────────
#
#  Subdomains:
#    meetin.space           → Frontend  (port 3000)
#    api.meetin.space       → Backend   (port 6001)
#    livekit.meetin.space   → LiveKit   (port 7880, WebSocket)
#    auth.meetin.space      → Supabase  (port 8000, Kong gateway)
#
#  Prerequisites:
#    - Certbot / Let's Encrypt for TLS (see ssl-setup section below)
#    - DNS A records for meetin.space, api, livekit, auth subdomains
#    - TURN uses meetin.space on ports 3478/5349 (not proxied by nginx)
#
# ─────────────────────────────────────────────────────────────

# ── Upstreams ────────────────────────────────────────────────

upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:6001;
}

upstream livekit {
    server 127.0.0.1:7880;
}

upstream supabase {
    server 127.0.0.1:8000;
}

# ── Redirect HTTP → HTTPS (all subdomains) ──────────────────

server {
    listen 80;
    listen [::]:80;
    server_name meetin.space api.meetin.space livekit.meetin.space auth.meetin.space;

    # ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend — meetin.space ──────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meetin.space;

    ssl_certificate     /etc/letsencrypt/live/meetin.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetin.space/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 10M;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Vite HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Backend API — api.meetin.space ───────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.meetin.space;

    ssl_certificate     /etc/letsencrypt/live/meetin.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetin.space/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 50M;  # avatar uploads, file attachments

    # API proxy
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO gateway)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeouts for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ── LiveKit — livekit.meetin.space ───────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name livekit.meetin.space;

    ssl_certificate     /etc/letsencrypt/live/meetin.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetin.space/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://livekit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — required for LiveKit signaling
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-lived connections for media signaling
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}

# ── Supabase — auth.meetin.space ─────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.meetin.space;

    ssl_certificate     /etc/letsencrypt/live/meetin.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetin.space/privkey.pem;
    include             /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 50M;  # storage uploads

    location / {
        proxy_pass http://supabase;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for Supabase Realtime
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
